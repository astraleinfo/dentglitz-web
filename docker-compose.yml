services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "start"]
    ports:
      - "4000:3000"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M